<!DOCTYPE html>
<html>
<head>
<title>For Cassandra</title>

<style>

body{
background:#ffd6e0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
flex-direction:column;
}

/* envelope */
.envelope{
position:relative;
width:260px;
height:180px;
background:#ff8fa3;
cursor:pointer;
border-radius:5px;
display:flex;
justify-content:center;
align-items:center;
transition:transform 0.3s;
}

.envelope:hover{
transform:scale(1.05);
}

/* triangle flap */
.envelope:before{
content:"";
position:absolute;
top:-90px;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-bottom:90px solid #ff8fa3;
}

/* heart */
.heart{
font-size:40px;
}

/* letter */
.letter{
position:absolute;
width:320px;
background:white;
padding:25px;
border-radius:10px;
text-align:center;
top:220px;
opacity:0;
transform:translateY(40px);
transition:all 0.6s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* show letter */
.show{
opacity:1;
transform:translateY(0);
}

h2{
color:#ff4d6d;
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
<div class="heart">❤️</div>
</div>

<div class="letter" id="letter">

<h2>Happy Birthday Cassandra</h2>

<p>
I made this little website just for you.
It may be simple, but it comes from the heart.
</p>

<p>
I hope your birthday is filled with happiness,
laughter, and beautiful moments.
</p>

<p>
You deserve all the good things in the world.
</p>

</div>

<script>

function openLetter(){
document.getElementById("letter").classList.toggle("show");
}

</script>

</body>
</html>
