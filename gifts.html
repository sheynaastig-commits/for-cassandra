<!DOCTYPE html>
<html>
<head>
<title>Mystery Gifts</title>

<style>

body{
background:#ffd6e0;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

h1{
color:#800020;
margin-bottom:40px;
}

.gifts{
display:flex;
gap:50px;
}

/* Gift Box */

.box{
position:relative;
width:160px;
height:160px;
background:#c1121f;
border-radius:10px;
cursor:pointer;
transition:0.3s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

/* Ribbon Vertical */

.box::before{
content:"";
position:absolute;
width:20px;
height:100%;
background:#ffd6e0;
left:50%;
transform:translateX(-50%);
}

/* Ribbon Horizontal */

.box::after{
content:"";
position:absolute;
height:20px;
width:100%;
background:#ffd6e0;
top:50%;
transform:translateY(-50%);
}

/* Bow */

.bow{
position:absolute;
top:-20px;
font-size:30px;
}

/* Hover Effect */

.box:hover{
transform:scale(1.1) rotate(-2deg);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* Text */

.label{
position:relative;
z-index:2;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Pick a Mystery Gift 🎁</h1>

<div class="gifts">

<div class="box" onclick="location.href='letter.html'">
<div class="bow">🎀</div>
<div class="label">Mystery</div>
</div>

<div class="box" onclick="location.href='music.html'">
<div class="bow">🎀</div>
<div class="label">Mystery</div>
</div>

<div class="box" onclick="location.href='pictures.html'">
<div class="bow">🎀</div>
<div class="label">Mystery</div>
</div>

</div>

</body>
</html>
